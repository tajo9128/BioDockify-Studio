version: '3.8'

services:
  biodockify:
    build:
      context: .
      dockerfile: Dockerfile.student
    ports:
      - "8000:8000"
    volumes:
      - biodockify-data:/app/backend/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AI_MODE=auto
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3:4b
      - OLLAMA_TIMEOUT=120

volumes:
  biodockify-data: