name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
       
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
       
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tajo9128
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" == *[!0-9]* ]]; then
            VERSION="latest"
          fi
          if [[ -z "$VERSION" || "$VERSION" == "main" ]]; then
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build and Push Single Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.single
          push: true
          tags: |
            tajo9128/biodockify-studio-ai:latest
            tajo9128/biodockify-studio-ai:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and Push Full Stack
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            tajo9128/biodockify-studio-ai:full-latest
            tajo9128/biodockify-studio-ai:full-${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Show pushed tags
        run: |
          echo "Docker image pushed:"
          echo "  tajo9128/biodockify-studio-ai:${{ steps.version.outputs.VERSION }}"
          echo "  tajo9128/biodockify-studio-ai:full-${{ steps.version.outputs.VERSION }}"
